name: collect-and-deploy

on:
  schedule:
    - cron: "0 20 * * *"   # 매일 05:00 KST
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps and run tests
        run: |
          pip install -r requirements.txt pytest
          pytest -q

      - name: Collect data
        env:
          BIZINFO_CRTFC_KEY: ${{ secrets.BIZINFO_CRTFC_KEY }}
        run: python -m collector.build

      - name: Warn on partial source failure
        run: |
          python - <<'EOF'
          import json
          meta = json.load(open("site/data/meta.json", encoding="utf-8"))
          for name, s in meta["sources"].items():
              if not s["ok"]:
                  print(f"::warning::{name} 수집 실패 — 이전 데이터 사용: {s['error']}")
          EOF

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "데이터 변경 없음 — 커밋 생략"
          else
            git commit -m "data: daily refresh"
            git pull --rebase origin master
            git push
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
